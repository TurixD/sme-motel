<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — SME</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: var(--space-6);
        }
        .login-brand {
            font-size: var(--text-2xl);
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }
        .login-brand span { color: var(--accent-ai); }
        .login-subtitle {
            font-size: var(--text-sm);
            color: var(--text-tertiary);
            margin-bottom: var(--space-8);
        }
        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-8);
            width: 100%;
            max-width: 360px;
        }
        .login-card__title {
            font-size: var(--text-base);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-6);
        }
        .form-field {
            margin-bottom: var(--space-4);
        }
        .form-field label {
            display: block;
            font-size: var(--text-sm);
            color: var(--text-secondary);
            margin-bottom: var(--space-2);
        }
        .form-field input {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            font-size: var(--text-sm);
            color: var(--text-primary);
            font-family: var(--font-sans);
            box-sizing: border-box;
            transition: border-color var(--transition-hover);
        }
        .form-field input:focus {
            outline: none;
            border-color: var(--accent-ai);
        }
        .login-error {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            background: color-mix(in srgb, var(--status-error) 12%, transparent);
            border: 1px solid color-mix(in srgb, var(--status-error) 30%, transparent);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            font-size: var(--text-sm);
            color: var(--status-error);
            margin-bottom: var(--space-4);
        }
        .login-submit {
            width: 100%;
            margin-top: var(--space-6);
            padding: var(--space-3) var(--space-4);
            background: var(--accent-ai);
            color: var(--bg-primary);
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: 600;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: opacity var(--transition-hover);
        }
        .login-submit:hover { opacity: 0.88; }
        .login-firma {
            margin-top: var(--space-8);
            font-size: 11px;
            color: var(--text-tertiary);
        }
    </style>
</head>
<body>
    <div class="login-brand">S<span>M</span>E</div>
    <p class="login-subtitle">Motel Hacienda Del Sauz</p>

    <div class="login-card">
        <p class="login-card__title">Iniciar sesión como admin</p>

        {% if error %}
        <div class="login-error">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-field">
                <label for="username">Usuario</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    autocomplete="username"
                    autocapitalize="none"
                    spellcheck="false"
                    required
                    autofocus
                >
            </div>
            <div class="form-field">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required
                >
            </div>
            <button class="login-submit" type="submit">Entrar</button>
        </form>
    </div>

    <p class="login-firma">トゥリ＆ガーティ制作 2026</p>
</body>
</html>
