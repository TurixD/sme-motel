<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — SME</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="login-brand">S<span>M</span>E</div>
    <p class="login-subtitle">Motel Hacienda Del Sauz</p>

    <!-- PASO 1: grilla de perfiles -->
    <section id="step-profiles" class="login-step">
        <h1 class="login-question">¿Quién está usando SME?</h1>

        <div class="profile-grid">
            {% for u in usuarios %}
            <div class="profile-card"
                 tabindex="0"
                 role="button"
                 aria-label="Entrar como {{ u.nombre_display }}"
                 data-username="{{ u.username }}"
                 data-index="{{ loop.index0 }}"
                 onclick="seleccionarPerfil(this)"
                 onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();seleccionarPerfil(this)}">
                <div class="profile-avatar profile-avatar--md" data-user="{{ u.username }}" data-color-index="{{ loop.index0 }}">
                    {% if u.username == 'empleado' %}
                    <img src="{{ url_for('static', filename='img/perfil_mostrador.jpg') }}" alt="Mostrador" class="profile-avatar__img">
                    {% else %}
                    {{ u.nombre_display[0]|upper }}
                    {% endif %}
                </div>
                <span class="profile-name">{{ u.nombre_display }}</span>
            </div>
            {% endfor %}
        </div>
    </section>

    <!-- PASO 2: password -->
    <section id="step-password" class="login-step">
        <div class="profile-avatar profile-avatar--lg" id="selected-avatar"></div>
        <p class="selected-name" id="selected-name"></p>

        {% if error %}
        <div class="login-error">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" id="password-form">
            <input type="hidden" name="username" id="hidden-username" value="{{ prefill_username or '' }}">
            <div class="form-field">
                <input
                    type="password"
                    id="password-input"
                    name="password"
                    placeholder="Contraseña"
                    autocomplete="current-password"
                    required
                >
            </div>
            <button class="login-submit" type="submit">Entrar</button>
        </form>

        <button type="button" class="login-link-btn" onclick="volverAPerfiles()">← Cambiar de usuario</button>
    </section>

    <p class="login-firma">トゥリ＆ガーティ制作 2026</p>

    <script>
        const USUARIOS = {{ usuarios|tojson }};
        const PREFILL_USERNAME = {{ (prefill_username or '')|tojson }};

        function mostrarPaso(paso) {
            document.getElementById('step-profiles').classList.toggle('active', paso === 1);
            document.getElementById('step-password').classList.toggle('active', paso === 2);
            if (paso === 2) {
                document.getElementById('password-input').focus();
            }
        }

        function pintarSeleccion(usuario, colorIndex) {
            document.getElementById('hidden-username').value = usuario.username;
            document.getElementById('selected-name').textContent = usuario.nombre_display;
            const avatar = document.getElementById('selected-avatar');
            avatar.dataset.user = usuario.username;
            avatar.dataset.colorIndex = colorIndex;
            if (usuario.username === 'empleado') {
                avatar.innerHTML = '<img src="/static/img/perfil_mostrador.jpg" alt="Mostrador" class="profile-avatar__img">';
            } else {
                avatar.textContent = usuario.nombre_display[0].toUpperCase();
            }
        }

        function seleccionarPerfil(card) {
            const username = card.dataset.username;
            const colorIndex = card.dataset.index;
            const usuario = USUARIOS.find(u => u.username === username);
            if (!usuario) return;
            pintarSeleccion(usuario, colorIndex);
            mostrarPaso(2);
        }

        function volverAPerfiles() {
            mostrarPaso(1);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('step-password').classList.contains('active')) {
                volverAPerfiles();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            if (PREFILL_USERNAME) {
                const idx = USUARIOS.findIndex(u => u.username === PREFILL_USERNAME);
                const usuario = USUARIOS[idx];
                if (usuario) {
                    pintarSeleccion(usuario, idx);
                }
                mostrarPaso(2);
            } else {
                mostrarPaso(1);
            }
        });
    </script>
</body>
</html>
